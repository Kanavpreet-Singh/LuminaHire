# Copy this to /etc/nginx/sites-available/luminahire on the server, then:
#   sudo ln -s /etc/nginx/sites-available/luminahire /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Afterwards, run: sudo certbot --nginx -d luminahire.tech -d www.luminahire.tech
# certbot will rewrite this file to add the SSL server block automatically.

server {
    listen 80;
    server_name luminahire.tech www.luminahire.tech;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
